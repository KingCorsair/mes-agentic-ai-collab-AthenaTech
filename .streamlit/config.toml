[theme]
# Palette mirrors Langfuse's frontend (shadcn/ui "slate" light theme):
# background #fff, near-black slate foreground/primary, slate-100 muted
# surfaces, slate-200 borders.
primaryColor = "#0F172A"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#020817"
font = "sans serif"

[client]
# Keep developer chrome out of the business user's way.
toolbarMode = "minimal"
showErrorDetails = false
